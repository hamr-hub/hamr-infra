networks:
  hamr-net:
    driver: bridge
    name: hamr-net

volumes:
  prometheus_data:
  grafana_data:
  postgres_data:
  redis_data:
  backup_data:

services:
  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - hamr-net
    depends_on:
      - hamr-website
      - hamr-help
      - hamr-developer
      - hamr-docs
      - hamr-account
      - hamr-app
      - hamr-status
      - hamr-api-gateway
      - hamr-jiabu
      - hamr-deploy
      - hamr-demo

  hamr-website:
    build: ../../repos/hamr-website
    image: hamr-website:latest
    container_name: hamr-website
    restart: unless-stopped
    networks:
      - hamr-net

  hamr-help:
    build: ../../repos/hamr-help
    image: hamr-help:latest
    container_name: hamr-help
    restart: unless-stopped
    networks:
      - hamr-net

  hamr-developer:
    build: ../../repos/hamr-developer
    image: hamr-developer:latest
    container_name: hamr-developer
    restart: unless-stopped
    networks:
      - hamr-net

  hamr-docs:
    build: ../../repos/hamr-docs
    image: hamr-docs:latest
    container_name: hamr-docs
    restart: unless-stopped
    networks:
      - hamr-net

  hamr-account:
    build: ../../repos/hamr-account/frontend
    image: hamr-account:latest
    container_name: hamr-account
    restart: unless-stopped
    networks:
      - hamr-net

  hamr-account-api:
    build: ../../repos/hamr-account/backend
    image: hamr-account-api:latest
    container_name: hamr-account-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-hamr}:${POSTGRES_PASSWORD:?}@hamr-postgres:5432/hamr_account
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PORT: 3001
    networks:
      - hamr-net
    depends_on:
      postgres:
        condition: service_healthy

  hamr-jiabu:
    build: ../../repos/hamr-jiabu/frontend
    image: hamr-jiabu:latest
    container_name: hamr-jiabu
    restart: unless-stopped
    networks:
      - hamr-net

  hamr-jiabu-api:
    build: ../../repos/hamr-jiabu/backend
    image: hamr-jiabu-api:latest
    container_name: hamr-jiabu-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-hamr}:${POSTGRES_PASSWORD:?}@hamr-postgres:5432/${POSTGRES_DB:-hamr_jiabu}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      HAMR_APP_URL: http://hamr-app-api:8081
      PORT: 8082
    networks:
      - hamr-net
    depends_on:
      - postgres
      - hamr-app-api

  hamr-api-gateway:
    build: ../../repos/hamr-api
    image: hamr-api-gateway:latest
    container_name: hamr-api-gateway
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ACCOUNT_SERVICE_URL: http://hamr-account-api:3001
      APP_SERVICE_URL: http://hamr-app-api:3002
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      PORT: 8090
    networks:
      - hamr-net
    depends_on:
      - hamr-account-api
      - hamr-app-api

  hamr-app:
    build: ../../repos/hamr-app/frontend
    image: hamr-app:latest
    container_name: hamr-app
    restart: unless-stopped
    networks:
      - hamr-net

  hamr-status:
    build: ../../repos/hamr-status
    image: hamr-status:latest
    container_name: hamr-status
    restart: unless-stopped
    networks:
      - hamr-net

  hamr-deploy:
    build: ../../repos/hamr-deploy
    image: hamr-deploy:latest
    container_name: hamr-deploy
    restart: unless-stopped
    networks:
      - hamr-net

  hamr-demo:
    build: ../../repos/hamr-demo/frontend
    image: hamr-demo:latest
    container_name: hamr-demo
    restart: unless-stopped
    networks:
      - hamr-net

  hamr-demo-api:
    build: ../../repos/hamr-demo/backend
    image: hamr-demo-api:latest
    container_name: hamr-demo-api
    restart: unless-stopped
    environment:
      PORT: 3004
      RUST_LOG: info
    networks:
      - hamr-net

  hamr-app-api:
    build: ../../repos/hamr-app/backend
    image: hamr-app-api:latest
    container_name: hamr-app-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-hamr}:${POSTGRES_PASSWORD:?}@hamr-postgres:5432/hamr_app
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PORT: 3002
    networks:
      - hamr-net
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: hamr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hamr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: hamr
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hamr}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hamr-net

  redis:
    image: redis:7-alpine
    container_name: hamr-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - hamr-net

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    networks:
      - hamr-net

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    networks:
      - hamr-net
    depends_on:
      - node-exporter

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://status.hamr.top/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - hamr-net
    depends_on:
      - prometheus
