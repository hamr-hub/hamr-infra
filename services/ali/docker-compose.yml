networks:
  hamr-net:
    external: true

volumes:
  prometheus_data:
  grafana_data:
  postgres_account_data:
  postgres_app_data:
  postgres_jiabu_data:

services:
  # ===== 开发者门户 =====
  hamr-developer:
    image: hamr-developer:latest
    container_name: hamr-developer
    restart: unless-stopped
    ports:
      - "127.0.0.1:8105:80"
    networks:
      - hamr-net

  # ===== 静态前端 =====
  hamr-website:
    image: hamr-website:latest
    container_name: hamr-website
    restart: unless-stopped
    ports:
      - "127.0.0.1:8100:80"
    networks:
      - hamr-net

  hamr-help:
    image: hamr-help:latest
    container_name: hamr-help
    restart: unless-stopped
    ports:
      - "127.0.0.1:8101:80"
    networks:
      - hamr-net

  # ===== 账号中心 =====
  hamr-account:
    image: hamr-account:latest
    container_name: hamr-account
    restart: unless-stopped
    ports:
      - "127.0.0.1:8102:80"
    networks:
      - hamr-net

  hamr-account-api:
    image: hamr-account-api:latest
    container_name: hamr-account-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hamr}:${POSTGRES_PASSWORD:?}@hamr-postgres-account:5432/hamr_account
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PORT: 3001
      RUST_LOG: info
    networks:
      - hamr-net
    depends_on:
      hamr-postgres-account:
        condition: service_healthy

  hamr-postgres-account:
    image: postgres:16-alpine
    container_name: hamr-postgres-account
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hamr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: hamr_account
    volumes:
      - postgres_account_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hamr} -d hamr_account"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hamr-net

  # ===== 管家应用 =====
  hamr-app:
    image: hamr-app:latest
    container_name: hamr-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8103:80"
    networks:
      - hamr-net

  hamr-app-api:
    image: hamr-app-api:latest
    container_name: hamr-app-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hamr}:${POSTGRES_PASSWORD:?}@hamr-postgres-app:5432/hamr_app
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PORT: 3002
      RUST_LOG: info
    networks:
      - hamr-net
    depends_on:
      hamr-postgres-app:
        condition: service_healthy

  hamr-postgres-app:
    image: postgres:16-alpine
    container_name: hamr-postgres-app
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hamr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: hamr_app
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hamr} -d hamr_app"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hamr-net

  # ===== API 网关 =====
  hamr-api-gateway:
    image: hamr-api-gateway:latest
    container_name: hamr-api-gateway
    restart: unless-stopped
    environment:
      PORT: 8090
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ACCOUNT_SERVICE_URL: http://hamr-account-api:3001
      APP_SERVICE_URL: http://hamr-app-api:3002
      JIABU_SERVICE_URL: http://hamr-jiabu-api:3003
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      RUST_LOG: info
    ports:
      - "127.0.0.1:8090:8090"
    networks:
      - hamr-net
    depends_on:
      - hamr-account-api
      - hamr-app-api

  # ===== JiaBu 决策系统 =====
  hamr-jiabu:
    image: hamr-jiabu:latest
    container_name: hamr-jiabu
    restart: unless-stopped
    ports:
      - "127.0.0.1:8104:80"
    networks:
      - hamr-net

  hamr-jiabu-api:
    image: hamr-jiabu-api:latest
    container_name: hamr-jiabu-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hamr}:${POSTGRES_PASSWORD:?}@hamr-postgres-jiabu:5432/hamr_jiabu
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PORT: 3003
      RUST_LOG: info
    networks:
      - hamr-net
    depends_on:
      hamr-postgres-jiabu:
        condition: service_healthy

  hamr-postgres-jiabu:
    image: postgres:16-alpine
    container_name: hamr-postgres-jiabu
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hamr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: hamr_jiabu
    volumes:
      - postgres_jiabu_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hamr} -d hamr_jiabu"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hamr-net

  # ===== 监控 =====
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    networks:
      - hamr-net

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - /opt/hamr/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /opt/hamr/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    networks:
      - hamr-net
    depends_on:
      - node-exporter

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://status.hamr.top/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
      - /opt/hamr/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - hamr-net
    depends_on:
      - prometheus
